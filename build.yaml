targets:
  $default:
    builders:
      injectable_generator:injectable_builder:
        enabled: true
        options:
          auto_register: true
          # Generates injectable.config.dart
          generate_for_dir: true
      freezed:freezed:
        enabled: true
      json_serializable:json_serializable:
        enabled: true
        options:
          any_map: true
          checked: true
          create_factory: true
          create_to_json: true
          disallow_unrecognized_keys: true
          explicit_to_json: true
